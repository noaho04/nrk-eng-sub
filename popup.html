<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 220px;
      padding: 16px;
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: ui-monospace, 'Cascadia Code', monospace;
      font-size: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #e8ff47;
    }

    h1 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #e8ff47;
    }

    p {
      color: #888;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      padding: 2px 6px;
      color: #e8ff47;
      font-size: 10px;
      letter-spacing: 0.05em;
    }

  </style>
</head>
<body>
  <div class="logo">
    <div class="dot"></div>
    <h1>NRK English Subs</h1>
  </div>

  <p>Active on <span class="tag">tv.nrk.no</span></p>

</body>
</html>
